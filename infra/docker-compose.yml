services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: lstm-stock-api:latest
    container_name: lstm-stock-api
    env_file:
      - ../.env
    ports:
      - "${PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lstm-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - lstm-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - lstm-network

  streamlit:
    build:
      context: ..
      dockerfile: infra/Dockerfile.streamlit
    image: lstm-stock-streamlit:latest
    container_name: lstm-stock-streamlit
    environment:
      - API_URL=http://api:8000
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_HEALTH_URL=http://grafana:3000/api/health
      - GRAFANA_PUBLIC_URL=http://localhost:3000/d/lstm-stock-api/lstm-stock-api-monitoramento
    ports:
      - "8501:8501"
    depends_on:
      - api
      - prometheus
      - grafana
    networks:
      - lstm-network

networks:
  lstm-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
